version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: playlist_saver
      POSTGRES_USER: playlist_saver
      POSTGRES_PASSWORD: playlist_saver
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    command: celery -A app.tasks.celery_app.celery worker -l info
    depends_on:
      - backend
      - redis
      - postgres
    volumes:
      - ./backend:/app

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    command: celery -A app.tasks.celery_app.celery beat -l info
    depends_on:
      - worker
      - redis
      - postgres
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

volumes:
  postgres_data:
